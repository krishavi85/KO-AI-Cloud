services:
  postgres:
    image: postgres:16
    container_name: ko_ai_postgres
    environment:
      POSTGRES_DB: ko_ai
      POSTGRES_USER: ko_ai_user
      POSTGRES_PASSWORD: ko_ai_password
    ports:
      - "5432:5432"
    volumes:
      - ko_ai_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: ko_ai_redis
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ko_ai_qdrant
    ports:
      - "6333:6333"
    volumes:
      - ko_ai_qdrant:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    container_name: ko_ai_ollama
    ports:
      - "11434:11434"
    volumes:
      - ko_ai_ollama:/root/.ollama

  backend:
    build: ./backend
    container_name: ko_ai_backend
    depends_on:
      - postgres
      - redis
      - qdrant
      - ollama
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    volumes:
      - ko_ai_uploads:/app/uploads

  frontend:
    image: node:22
    container_name: ko_ai_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  ko_ai_pgdata:
  ko_ai_ollama:
  ko_ai_qdrant:
  ko_ai_uploads:
